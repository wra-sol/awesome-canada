name: Validate Resources

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run validation
        run: node scripts/validate.js

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: |
            scripts/validate.js
          retention-days: 7