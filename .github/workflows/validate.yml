name: Validate Resources

on:
  push:
    branches: [master]
    paths:
      - 'data/**'
      - 'scripts/**'
  pull_request:
    branches: [master]
    paths:
      - 'data/**'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate resources
        run: node scripts/validate.js
