name: Submit a Link

description: Suggest a new Canadian government data source for the directory

title: "[Submission] "

labels:
  - submission
  - needs-triage

body:
  - type: input
    id: name
    attributes:
      label: Resource Name
      description: What is this resource called?
      placeholder: e.g., Guelph Open Data — Building Permits
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL
      description: Direct link to the dataset, tool, or portal
      placeholder: https://...
    validations:
      required: true

  - type: dropdown
    id: level
    attributes:
      label: Government Level
      options:
        - Federal
        - Provincial
        - Municipal
        - Regional
        - Agency
        - Crown Corp
    validations:
      required: true

  - type: input
    id: jurisdiction
    attributes:
      label: Jurisdiction
      description: City, Province, Region, or "Canada" for federal
      placeholder: e.g., Guelph, Ontario
    validations:
      required: true

  - type: input
    id: category
    attributes:
      label: Category
      description: What type of resource is this? (open-data, planning-zoning, council, budget, transit, health-region, school-board, lobbyist, heritage, etc.)
      placeholder: open-data
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What can someone DO with this link? Include data format if known (CSV, GeoJSON, GTFS, API, etc.)
      placeholder: CSV download of building permits issued 2015-present...
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated keywords including region and data format
      placeholder: guelph, building permits, csv, geocoded

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Anything else we should know? Why is this hard to find or especially useful?
